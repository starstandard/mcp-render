services:
  - type: web
    name: appointment-metadata-mcp
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
      - key: SPEC_FILE
        value: ./openapi/appointment-api.yaml
      - key: SERVER_NAME
        value: appointment-metadata-mcp
      - key: ALLOW_WRITE_TOOLS
        value: false
